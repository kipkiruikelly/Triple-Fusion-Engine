<!DOCTYPE html>
<html lang="en"{{ theme_attr }}>
<head>
  {% include "_theme.html" %}
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login, BullLogic</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center}
    .box{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:36px;width:min(380px,92vw)}
    .logo{font-size:16pt;font-weight:700;color:var(--white);margin-bottom:4px}
    .logo span{color:var(--accent)}
    .sub{color:var(--muted);font-size:9.5pt;margin-bottom:24px}
    label{display:block;font-size:8.5pt;font-weight:600;color:var(--muted);margin:14px 0 6px;text-transform:uppercase;letter-spacing:.4px}
    input{width:100%;padding:10px 12px;border-radius:7px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:10pt;font-family:inherit}
    button{width:100%;margin-top:20px;padding:11px;border-radius:7px;border:none;background:var(--accent);color:#fff;font-weight:700;font-size:10pt;cursor:pointer;font-family:inherit}
    .err{background:rgba(255,77,77,.1);border:1px solid rgba(255,77,77,.4);color:var(--red);border-radius:7px;padding:10px 12px;font-size:9pt;margin-bottom:6px}
    .foot{margin-top:18px;text-align:center;font-size:8.5pt;color:var(--muted)}
    .foot a{color:var(--accent);text-decoration:none}
    .divider{display:flex;align-items:center;gap:10px;margin:18px 0 0;color:var(--muted);font-size:8.5pt}
    .divider::before,.divider::after{content:"";flex:1;height:1px;background:var(--border)}
    .gbtn{display:flex;align-items:center;justify-content:center;gap:9px;width:100%;margin-top:14px;padding:10px;border-radius:7px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-weight:600;font-size:9.5pt;text-decoration:none}
    .gbtn:hover{border-color:var(--accent)}
  </style>
</head>
<body>
  <button id="themeToggle" class="theme-toggle theme-toggle-float" onclick="toggleTheme()">☾ Dark</button>
  <form class="box" method="POST">
    <div class="logo">Bull<span>Logic</span></div>
    <div class="sub">Admin console, authorized staff only. All access is logged.</div>
    {% if error %}<div class="err">{{ error }}</div>{% endif %}
    <label>Username or email</label>
    <input name="identifier" autofocus autocomplete="username" required>
    <label>Password</label>
    <input name="password" type="password" autocomplete="current-password" required>
    <button type="submit">Sign in</button>
    <div class="foot"><a href="/forgot-password">Forgot password?</a> · <a href="/">← Back to app</a></div>

    {% if google_enabled %}
    <div class="divider">or</div>
    <a class="gbtn" href="/auth/google?admin=1">
      <svg width="16" height="16" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.1H42V20H24v8h11.3C33.7 32.7 29.2 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.2 8 3l5.7-5.7C34.2 6.1 29.3 4 24 4 13 4 4 13 4 24s9 20 20 20 20-9 20-20c0-1.3-.1-2.6-.4-3.9z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.6 15.1 18.9 12 24 12c3.1 0 5.9 1.2 8 3l5.7-5.7C34.2 6.1 29.3 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5.2 0 9.9-2 13.4-5.2l-6.2-5.2C29.2 35.1 26.7 36 24 36c-5.2 0-9.6-3.3-11.3-8l-6.5 5C9.5 39.6 16.2 44 24 44z"/><path fill="#1976D2" d="M43.6 20.1H42V20H24v8h11.3c-.8 2.2-2.2 4.2-4.1 5.6l6.2 5.2C36.9 39.2 44 34 44 24c0-1.3-.1-2.6-.4-3.9z"/></svg>
      Sign in with Google
    </a>
    {% endif %}
  </form>
</body>
</html>
