<!DOCTYPE html>
<html lang="en"{{ theme_attr }}>
<head>
  {% include "_theme.html" %}
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calendar, BullLogic</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--yellow:#F59E0B}
    body{font-family:'Inter',sans-serif;font-size:11pt;background:var(--bg);color:var(--text);min-height:100vh}
    .container{max-width:1000px;margin:0 auto;padding:32px 24px}
    h1{font-size:20pt;font-weight:700;margin-bottom:4px}
    .subtitle{color:var(--muted);font-size:10pt;margin-bottom:28px}
    .two-col{display:grid;grid-template-columns:1fr 1fr;gap:24px}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:22px}
    .card-title{font-size:11pt;font-weight:600;margin-bottom:16px;display:flex;align-items:center;gap:8px}
    .event-list{display:flex;flex-direction:column;gap:8px}
    .event-item{display:flex;align-items:center;gap:14px;background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:11px 14px}
    .event-date{min-width:72px;text-align:center;background:var(--bg);border-radius:5px;padding:5px 8px}
    .event-date .day{font-size:14pt;font-weight:700;line-height:1.1}
    .event-date .mon{font-size:8pt;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
    .event-body{flex:1}
    .event-name{font-weight:600;font-size:10pt}
    .event-sub{font-size:8.5pt;color:var(--muted);margin-top:2px}
    .badge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:8pt;font-weight:600}
    .badge-high{background:rgba(255,77,77,.15);color:var(--red)}
    .badge-medium{background:rgba(245,158,11,.15);color:var(--yellow)}
    .badge-low{background:rgba(122,132,153,.12);color:var(--muted)}
    .days-chip{background:var(--surface);border:1px solid var(--border);padding:3px 9px;border-radius:4px;font-size:8.5pt;color:var(--muted);white-space:nowrap}
    .empty{text-align:center;padding:32px;color:var(--muted);font-size:9.5pt}
    @media(max-width:700px){.two-col{grid-template-columns:1fr}}
  </style>
</head>
<body>
{% include "_navbar.html" %}

<div class="container">
  <h1>Events Calendar</h1>
  <p class="subtitle">Upcoming earnings reports and macro events for the next 90 days.</p>

  <div class="two-col">
    <div class="card">
      <div class="card-title">📅 Earnings, Next 90 Days</div>
      <div class="event-list" id="earningsList"><div class="empty">Loading…</div></div>
    </div>

    <div class="card">
      <div class="card-title">📊 Macro Events</div>
      <div class="event-list" id="macroList"><div class="empty">Loading…</div></div>
    </div>
  </div>
</div>

<script>
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function eventItem(date, name, sub, badge, badgeCls, days) {
  const d = new Date(date + 'T00:00:00');
  const dStr = days === 0 ? 'Today' : days === 1 ? 'Tomorrow' : `In ${days}d`;
  return `
    <div class="event-item">
      <div class="event-date">
        <div class="day">${d.getDate()}</div>
        <div class="mon">${MONTHS[d.getMonth()]}</div>
      </div>
      <div class="event-body">
        <div class="event-name">${name}</div>
        <div class="event-sub">${sub}</div>
      </div>
      <span class="badge ${badgeCls}">${badge}</span>
      <span class="days-chip">${dStr}</span>
    </div>`;
}

fetch('/api/calendar/earnings').then(r=>r.json()).then(d=>{
  const el = document.getElementById('earningsList');
  if (!d.ok || !d.events.length) { el.innerHTML = '<div class="empty">No upcoming earnings found.</div>'; return; }
  el.innerHTML = d.events.map(e =>
    eventItem(e.date, e.ticker + ' Earnings', 'Expected earnings report', 'Earnings', 'badge-medium', e.days)
  ).join('');
}).catch(()=>document.getElementById('earningsList').innerHTML='<div class="empty">Could not load earnings data.</div>');

fetch('/api/calendar/macro').then(r=>r.json()).then(d=>{
  const el = document.getElementById('macroList');
  if (!d.ok || !d.events.length) { el.innerHTML = '<div class="empty">No macro events.</div>'; return; }
  const today = new Date(); today.setHours(0,0,0,0);
  el.innerHTML = d.events.map(e=>{
    const ev = new Date(e.date+'T00:00:00');
    const days = Math.round((ev-today)/86400000);
    const badgeCls = e.impact==='high'?'badge-high':e.impact==='medium'?'badge-medium':'badge-low';
    const badgeTxt = e.impact.charAt(0).toUpperCase()+e.impact.slice(1)+' Impact';
    return eventItem(e.date, e.name, e.category.charAt(0).toUpperCase()+e.category.slice(1), badgeTxt, badgeCls, days);
  }).join('');
}).catch(()=>document.getElementById('macroList').innerHTML='<div class="empty">Could not load macro events.</div>');
</script>
</body>
</html>
