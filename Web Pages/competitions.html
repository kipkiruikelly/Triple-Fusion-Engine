{% extends "_base.html" %}
{% set active_page = "competitions" %}
{% block title %}Competitions{% endblock %}

{% block page_styles %}
<style>
  .comp-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: var(--space-4); }
  .comp-card .card-body { display: flex; flex-direction: column; gap: var(--space-2); }
  .comp-meta { display: flex; justify-content: space-between; font-size: var(--text-sm); }
  .comp-meta .label { color: var(--text-muted); }
  .comp-leader {
    background: var(--bg-elevated); border: 1px solid var(--border-subtle);
    border-radius: var(--radius-md); padding: var(--space-2) var(--space-3);
    font-size: var(--text-sm); margin-top: var(--space-2);
  }
</style>
{% endblock %}

{% block content %}

  <div class="tabs" style="margin-bottom:var(--space-4)">
    <button class="tab active" data-status="active">Active</button>
    <button class="tab" data-status="upcoming">Upcoming</button>
    <button class="tab" data-status="completed">Completed</button>
  </div>

  <div class="comp-grid" id="comp-grid">
    <div class="card"><div class="card-body text-muted text-center">Loading competitions…</div></div>
  </div>

{% endblock %}

{% block page_scripts %}
<script>
(function () {
  var esc = BullLogic.escapeHtml;

  function badge(status) {
    var cls = { active: 'badge-success', upcoming: 'badge-info', completed: 'badge-purple' }[status] || 'badge-info';
    return '<span class="badge ' + cls + '">' + esc(status) + '</span>';
  }

  function load(status) {
    var grid = document.getElementById('comp-grid');
    grid.innerHTML = '<div class="card"><div class="card-body text-muted text-center">Loading…</div></div>';
    BullLogic.apiGet('/competitions', { status: status })
      .then(function (d) {
        var comps = (d.data && d.data.competitions) || d.competitions || [];
        if (!comps.length) {
          grid.innerHTML = '<div class="card"><div class="card-body text-muted text-center">No ' +
                           esc(status) + ' competitions right now — check back soon.</div></div>';
          return;
        }
        grid.innerHTML = comps.map(function (c) {
          return '<div class="card comp-card">' +
            '<div class="card-header"><h3>' + esc(c.name) + '</h3>' + badge(c.status) + '</div>' +
            '<div class="card-body">' +
              '<div class="comp-meta"><span class="label">Runs</span><span>' +
                esc(c.start_date) + ' → ' + esc(c.end_date) + '</span></div>' +
              '<div class="comp-meta"><span class="label">Participants</span><span>' + (c.participants || 0) + '</span></div>' +
              '<div class="comp-meta"><span class="label">Starting balance</span><span>' +
                BullLogic.formatCurrency(c.initial_balance || 0, 0) + '</span></div>' +
              (c.leader
                ? '<div class="comp-leader">🏆 Leader: <strong>' + esc(c.leader.username) + '</strong>' +
                  ' <span class="text-success">+' + c.leader.return_pct + '%</span></div>'
                : '') +
            '</div>' +
          '</div>';
        }).join('');
      })
      .catch(function () {
        grid.innerHTML = '<div class="card"><div class="card-body text-muted text-center">Could not load competitions.</div></div>';
      });
  }

  document.querySelectorAll('.tabs .tab').forEach(function (tab) {
    tab.addEventListener('click', function () {
      document.querySelectorAll('.tabs .tab').forEach(function (t) { t.classList.remove('active'); });
      tab.classList.add('active');
      load(tab.dataset.status);
    });
  });

  load('active');
})();
</script>
{% endblock %}
