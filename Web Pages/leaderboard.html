<!DOCTYPE html>
<html lang="en"{{ theme_attr }}>
<head>
  {% include "_theme.html" %}
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Signal Leaderboard, BullLogic</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
    .container{max-width:1100px;margin:0 auto;padding:32px 24px}
    h1{font-size:20pt;font-weight:700;color:var(--white);margin-bottom:6px}
    .subtitle{font-size:10.5pt;color:var(--muted);margin-bottom:24px}
    /* Filters */
    .filter-bar{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap;align-items:center}
    .filter-btn{background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--muted);font-size:9pt;font-weight:600;padding:6px 14px;cursor:pointer;transition:all .15s;font-family:inherit}
    .filter-btn:hover,.filter-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
    .search-input{background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:9.5pt;padding:6px 12px;font-family:inherit;width:140px}
    .search-input:focus{outline:none;border-color:var(--accent)}
    /* Cards grid */
    .cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px}
    .signal-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px;cursor:pointer;transition:border-color .15s;text-decoration:none;display:block}
    .signal-card:hover{border-color:var(--accent)}
    .card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
    .card-ticker{font-size:14pt;font-weight:700;color:var(--white)}
    .card-tf{font-size:8.5pt;font-weight:700;padding:3px 8px;border-radius:4px;background:rgba(255,107,53,0.12);color:var(--accent)}
    .card-tf.h1{background:rgba(59,130,246,0.12);color:#60A5FA}
    .card-tf.h4{background:rgba(139,92,246,0.12);color:#A78BFA}
    .action-badge{display:inline-block;font-size:8.5pt;font-weight:700;padding:4px 12px;border-radius:5px;margin-bottom:12px}
    .action-buy{background:rgba(0,192,118,0.15);color:var(--green)}
    .action-sell{background:rgba(255,77,77,0.15);color:var(--red)}
    .action-hold{background:rgba(122,132,153,0.12);color:var(--muted)}
    .card-stats{display:grid;grid-template-columns:1fr 1fr;gap:6px}
    .stat{background:var(--bg);border-radius:5px;padding:6px 10px}
    .stat-label{font-size:7.5pt;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.3px}
    .stat-value{font-size:10pt;font-weight:700;color:var(--white);margin-top:2px}
    .acc-bar{height:3px;border-radius:2px;background:var(--border);margin-top:10px;overflow:hidden}
    .acc-fill{height:100%;border-radius:2px;transition:width .4s}
    .rank-badge{font-size:8.5pt;font-weight:700;color:var(--muted);margin-bottom:4px}
    .rank-1{color:#FFD700}
    .rank-2{color:#C0C0C0}
    .rank-3{color:#CD7F32}
    /* Loading */
    .loading{text-align:center;padding:60px;color:var(--muted);font-size:10pt}
    .spinner{display:inline-block;width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:12px}
    @keyframes spin{to{transform:rotate(360deg)}}
    @media(max-width:640px){.cards-grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
{% include "_navbar.html" %}

<div class="container">
  <h1>&#127942; Signal Leaderboard</h1>
  <p class="subtitle">ML signals ranked by historical direction accuracy. Click any card to run a deep research.</p>

  <div class="filter-bar">
    <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
    <button class="filter-btn" onclick="setFilter('1d',this)">Daily</button>
    <button class="filter-btn" onclick="setFilter('1h',this)">1H</button>
    <button class="filter-btn" onclick="setFilter('4h',this)">4H</button>
    <button class="filter-btn" onclick="setFilter('buy',this)">&#8593; Buy</button>
    <button class="filter-btn" onclick="setFilter('sell',this)">&#8595; Sell</button>
    <input class="search-input" placeholder="Filter ticker…" oninput="setSearch(this.value)" />
    <span id="count" style="font-size:9pt;color:var(--muted);margin-left:4px"></span>
  </div>

  <div id="grid" class="cards-grid">
    <div class="loading"><div class="spinner"></div><br>Loading signals…</div>
  </div>
</div>

<script>
let _rows = [], _filter = 'all', _search = '';

async function load() {
  const d = await (await fetch('/api/leaderboard')).json();
  if (!d.ok) { document.getElementById('grid').innerHTML = '<div class="loading">Failed to load signals.</div>'; return; }
  _rows = d.rows;
  render();
}

function setFilter(f, btn) {
  _filter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}
function setSearch(v) { _search = v.toLowerCase(); render(); }

function render() {
  let rows = _rows;
  if (_filter !== 'all') {
    if (['1d','1h','4h'].includes(_filter)) rows = rows.filter(r => r.interval === _filter);
    else if (_filter === 'buy')  rows = rows.filter(r => r.action === 'BUY');
    else if (_filter === 'sell') rows = rows.filter(r => r.action === 'SELL');
  }
  if (_search) rows = rows.filter(r => r.ticker.toLowerCase().includes(_search));
  document.getElementById('count').textContent = rows.length + ' signals';

  if (!rows.length) {
    document.getElementById('grid').innerHTML = '<div class="loading">No signals match your filter.</div>';
    return;
  }

  const rankEmoji = ['🥇','🥈','🥉'];
  document.getElementById('grid').innerHTML = rows.map((r, i) => {
    const action = r.action?.toUpperCase() || 'HOLD';
    const actionClass = action === 'BUY' || action === 'STRONG BUY' ? 'action-buy'
                      : action === 'SELL' || action === 'STRONG SELL' ? 'action-sell'
                      : 'action-hold';
    const tfClass = r.interval === '1h' ? 'h1' : r.interval === '4h' ? 'h4' : '';
    const acc  = r.accuracy;
    const accColor = acc == null ? '#7A8499' : acc >= 65 ? '#00C076' : acc >= 55 ? '#FBBF24' : '#FF4D4D';
    const rankClass = i === 0 ? 'rank-1' : i === 1 ? 'rank-2' : i === 2 ? 'rank-3' : '';
    return `
    <a class="signal-card" href="/research/${r.ticker}">
      <div class="rank-badge ${rankClass}">${i < 3 ? rankEmoji[i] : '#' + (i+1)}</div>
      <div class="card-top">
        <div class="card-ticker">${r.ticker}</div>
        <span class="card-tf ${tfClass}">${r.interval.toUpperCase()}</span>
      </div>
      <div class="action-badge ${actionClass}">${action}</div>
      <div class="card-stats">
        <div class="stat"><div class="stat-label">Price</div><div class="stat-value">$${r.price > 0 ? r.price.toFixed(2) : '-'}</div></div>
        <div class="stat"><div class="stat-label">Confidence</div><div class="stat-value">${r.confidence ? r.confidence.toFixed(0) + '%' : '-'}</div></div>
        <div class="stat"><div class="stat-label">RSI</div><div class="stat-value" style="color:${r.rsi < 30 ? 'var(--green)' : r.rsi > 70 ? 'var(--red)' : 'var(--text)'}">${r.rsi ? r.rsi.toFixed(0) : '-'}</div></div>
        <div class="stat"><div class="stat-label">Direction Acc</div><div class="stat-value" style="color:${accColor}">${acc != null ? acc + '%' : r.n_checked < 3 ? 'Need data' : '-'}</div></div>
      </div>
      <div class="acc-bar"><div class="acc-fill" style="width:${acc ?? 0}%;background:${accColor}"></div></div>
    </a>`;
  }).join('');
}

load();

</script>
</body>
</html>
