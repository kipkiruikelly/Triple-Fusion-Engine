<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — BullLogic</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0F1217;
      --surface: #1A1F2E;
      --border:  #2A3150;
      --text:    #E2E8F0;
      --muted:   #7A8499;
      --accent:  #FF6B35;
      --red:     #FF4D4D;
      --white:   #FFFFFF;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo { font-size: 15pt; font-weight: 700; color: var(--white); letter-spacing: -0.5px; }
    .logo span { color: var(--accent); }

    .topbar-right a {
      color: var(--muted);
      text-decoration: none;
      font-size: 10pt;
      font-weight: 500;
    }

    .topbar-right a:hover { color: var(--white); }

    .auth-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 16px;
    }

    .auth-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 36px 40px;
      width: 100%;
      max-width: 420px;
    }

    .auth-title {
      font-size: 18pt;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 6px;
    }

    .auth-subtitle {
      font-size: 10pt;
      color: var(--muted);
      margin-bottom: 28px;
    }

    .form-group { margin-bottom: 16px; }

    .form-label {
      display: block;
      font-size: 9.5pt;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.4px;
      margin-bottom: 7px;
    }

    .form-input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 11px 14px;
      font-family: 'Inter', sans-serif;
      font-size: 11pt;
      color: var(--white);
      outline: none;
      transition: border-color 0.2s;
    }

    .form-input:focus { border-color: var(--accent); }
    .form-input::placeholder { color: var(--muted); font-size: 10pt; }

    .btn-submit {
      width: 100%;
      padding: 12px;
      background: var(--accent);
      color: var(--white);
      border: none;
      border-radius: 6px;
      font-family: 'Inter', sans-serif;
      font-size: 11pt;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.15s;
    }

    .btn-submit:hover { opacity: 0.88; }

    .error-box {
      background: rgba(255,77,77,0.1);
      border: 1px solid rgba(255,77,77,0.3);
      border-radius: 6px;
      padding: 10px 14px;
      margin-bottom: 18px;
      font-size: 10pt;
      color: var(--red);
    }

    .auth-footer {
      margin-top: 22px;
      text-align: center;
      font-size: 10pt;
      color: var(--muted);
    }

    .auth-footer a { color: var(--accent); text-decoration: none; font-weight: 600; }
    .auth-footer a:hover { text-decoration: underline; }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 22px 0;
    }
  </style>
</head>
<body>

<div class="topbar">
  <a href="/" class="logo" style="text-decoration:none;">Market<span>Predict</span></a>
  <div class="topbar-right">
    <a href="/register">Create account</a>
  </div>
</div>

<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-title">Welcome back</div>
    <div class="auth-subtitle">Sign in to your BullLogic account</div>

    {% if error %}
    <div class="error-box">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/login">
      <div class="form-group">
        <label class="form-label" for="identifier">Username or Email</label>
        <input class="form-input" type="text" id="identifier" name="identifier"
               placeholder="Enter username or email" autocomplete="username" autofocus />
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input class="form-input" type="password" id="password" name="password"
               placeholder="Enter password" autocomplete="current-password" />
      </div>
      <button type="submit" class="btn-submit">Sign In</button>
      <div style="text-align:right;margin-top:8px">
        <a href="/forgot-password" style="font-size:9pt;color:var(--muted);text-decoration:none">Forgot password?</a>
      </div>
    </form>

    <hr class="divider" />

    <div class="auth-footer">
      Don't have an account? <a href="/register">Create one for free</a>
    </div>
  </div>
</div>

</body>
</html>
