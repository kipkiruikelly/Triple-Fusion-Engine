<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Offline, BullLogic</title>
  <style>
    body{font-family:system-ui,-apple-system,sans-serif;background:#0F1217;color:#E2E8F0;min-height:100vh;display:flex;align-items:center;justify-content:center;margin:0;text-align:center;padding:20px}
    .logo{font-size:20pt;font-weight:700;color:#fff}.logo span{color:#FF6B35}
    p{color:#7A8499;max-width:380px;line-height:1.6}
    button{margin-top:14px;background:#FF6B35;color:#fff;border:none;border-radius:8px;padding:10px 22px;font-size:11pt;font-weight:700;cursor:pointer}
  </style>
</head>
<body>
  <div>
    <div class="logo">Bull<span>Logic</span></div>
    <h1 style="font-size:13pt;margin:16px 0 6px">You're offline</h1>
    <p>No internet connection right now. Your watchlist, portfolio, and prediction
    history are safe on the server and will be here when you're back online.</p>
    <button onclick="location.reload()">Try again</button>
  </div>
</body>
</html>
