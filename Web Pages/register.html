<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account — BullLogic</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0F1217;
      --surface: #1A1F2E;
      --border:  #2A3150;
      --text:    #E2E8F0;
      --muted:   #7A8499;
      --accent:  #FF6B35;
      --green:   #00C076;
      --red:     #FF4D4D;
      --white:   #FFFFFF;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo { font-size: 15pt; font-weight: 700; color: var(--white); letter-spacing: -0.5px; }
    .logo span { color: var(--accent); }

    .topbar-right a {
      color: var(--muted);
      text-decoration: none;
      font-size: 10pt;
      font-weight: 500;
    }

    .topbar-right a:hover { color: var(--white); }

    .auth-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 16px;
    }

    .auth-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 36px 40px;
      width: 100%;
      max-width: 420px;
    }

    .auth-title { font-size: 18pt; font-weight: 700; color: var(--white); margin-bottom: 6px; }
    .auth-subtitle { font-size: 10pt; color: var(--muted); margin-bottom: 28px; }

    .free-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(0,192,118,0.1);
      border: 1px solid rgba(0,192,118,0.25);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 9.5pt;
      font-weight: 600;
      color: var(--green);
      margin-bottom: 24px;
    }

    .form-group { margin-bottom: 16px; }

    .form-label {
      display: block;
      font-size: 9.5pt;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.4px;
      margin-bottom: 7px;
    }

    .form-input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 11px 14px;
      font-family: 'Inter', sans-serif;
      font-size: 11pt;
      color: var(--white);
      outline: none;
      transition: border-color 0.2s;
    }

    .form-input:focus { border-color: var(--accent); }
    .form-input::placeholder { color: var(--muted); font-size: 10pt; }

    .btn-submit {
      width: 100%;
      padding: 12px;
      background: var(--accent);
      color: var(--white);
      border: none;
      border-radius: 6px;
      font-family: 'Inter', sans-serif;
      font-size: 11pt;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.15s;
    }

    .btn-submit:hover { opacity: 0.88; }

    .error-box {
      background: rgba(255,77,77,0.1);
      border: 1px solid rgba(255,77,77,0.3);
      border-radius: 6px;
      padding: 10px 14px;
      margin-bottom: 18px;
      font-size: 10pt;
      color: var(--red);
    }

    .auth-footer {
      margin-top: 22px;
      text-align: center;
      font-size: 10pt;
      color: var(--muted);
    }

    .auth-footer a { color: var(--accent); text-decoration: none; font-weight: 600; }
    .auth-footer a:hover { text-decoration: underline; }

    .divider { border: none; border-top: 1px solid var(--border); margin: 22px 0; }

    .hint { font-size: 9pt; color: var(--muted); margin-top: 5px; }
  </style>
</head>
<body>

<div class="topbar">
  <a href="/" class="logo" style="text-decoration:none;">Market<span>Predict</span></a>
  <div class="topbar-right">
    <a href="/login">Sign in</a>
  </div>
</div>

<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-title">Create account</div>
    <div class="auth-subtitle">Start predicting stock prices for free</div>

    <div class="free-badge">&#10003; Free — 5 predictions/day</div>

    {% if error %}
    <div class="error-box">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/register">
      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <input class="form-input" type="text" id="username" name="username"
               placeholder="Choose a username" autocomplete="username" autofocus />
        <div class="hint">At least 3 characters</div>
      </div>
      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <input class="form-input" type="email" id="email" name="email"
               placeholder="your@email.com" autocomplete="email" />
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input class="form-input" type="password" id="password" name="password"
               placeholder="Create a password" autocomplete="new-password" />
        <div class="hint">At least 6 characters</div>
      </div>
      <div class="form-group">
        <label class="form-label" for="confirm">Confirm Password</label>
        <input class="form-input" type="password" id="confirm" name="confirm"
               placeholder="Repeat password" autocomplete="new-password" />
      </div>
      <button type="submit" class="btn-submit">Create Account</button>
    </form>

    <hr class="divider" />

    <div class="auth-footer">
      Already have an account? <a href="/login">Sign in</a>
    </div>
  </div>
</div>

</body>
</html>
