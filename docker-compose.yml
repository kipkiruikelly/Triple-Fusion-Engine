# ── Triple-Fusion-Engine Docker Compose ─────────────────────────────────────────
#
# Services:
#   web         Flask web UI + REST API (gunicorn)
#   predictor   ML prediction REST API (standalone gunicorn)
#   trader      MT5 trading engine (paper or live)
#   pipeline    Data collection cron job
#   redis       Message broker + cache
#
# Usage:
#   docker compose up -d                    # all services
#   docker compose up -d web predictor      # specific services
#   docker compose run pipeline             # one-off data pipeline
#
#   ENV=production docker compose up -d     # production overrides

version: "3.9"

services:
  # ── Redis (message broker + cache) ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: tfe-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ── Web UI ─────────────────────────────────────────────────────────────────
  web:
    build: .
    container_name: tfe-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:5000:5000"
    env_file:
      - .env
    environment:
      - ENV=${ENV:-development}
      - SERVICE_NAME=web
    volumes:
      - ./Data:/app/Data
      - ./Saved Models:/app/Saved Models
      - ./logs:/app/logs
      - ./instance:/app/instance
    depends_on:
      redis:
        condition: service_healthy
    command: >
      gunicorn --bind 0.0.0.0:5000
      --workers ${WEB_THREADS:-4}
      --timeout 120
      --access-logfile /app/logs/access.log
      --error-logfile /app/logs/error.log
      wsgi:app

  # ── Prediction API ─────────────────────────────────────────────────────────
  predictor:
    build: .
    container_name: tfe-predictor
    restart: unless-stopped
    ports:
      - "127.0.0.1:5001:5001"
    env_file:
      - .env
    environment:
      - ENV=${ENV:-development}
      - SERVICE_NAME=predictor
    volumes:
      - ./Saved Models:/app/Saved Models
      - ./logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
    command: >
      gunicorn --bind 0.0.0.0:5001
      --workers 2
      --timeout 180
      predictor_api:app

  # ── Trading Engine ─────────────────────────────────────────────────────────
  trader:
    build: .
    container_name: tfe-trader
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - ENV=${ENV:-development}
      - SERVICE_NAME=trader
      - TRADING_MODE=${TRADING_MODE:-paper}
    volumes:
      - ./Saved Models:/app/Saved Models
      - ./logs:/app/logs
      - ./Data:/app/Data
    depends_on:
      redis:
        condition: service_healthy
    command: python mt5_trading.py

  # ── Data Pipeline (scheduled via external cron or manual) ───────────────────
  pipeline:
    build: .
    container_name: tfe-pipeline
    restart: "no"
    env_file:
      - .env
    environment:
      - ENV=${ENV:-development}
      - SERVICE_NAME=pipeline
    volumes:
      - ./Data:/app/Data
      - ./logs:/app/logs
    profiles:
      - tools
    command: python data_pipeline.py

  # ── Model Training (one-off, explicit invocation) ───────────────────────────
  trainer:
    build: .
    container_name: tfe-trainer
    restart: "no"
    env_file:
      - .env
    environment:
      - ENV=${ENV:-development}
      - SERVICE_NAME=trainer
    volumes:
      - ./Data:/app/Data
      - ./Saved Models:/app/Saved Models
      - ./logs:/app/logs
    profiles:
      - tools
    command: python model_training.py

volumes:
  redis_data:
    driver: local
