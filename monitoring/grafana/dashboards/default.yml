# ── Grafana Dashboard Provisioning ────────────────────────────────────────
# Place exported JSON dashboards in monitoring/grafana/dashboards/

apiVersion: 1

providers:
  - name: default
    orgId: 1
    folder: ""
    type: file
    disableDeletion: true
    updateIntervalSeconds: 30
    options:
      path: /etc/grafana/provisioning/dashboards
