<!DOCTYPE html>
<html lang="en"{{ theme_attr }}>
<head>
  {% include "_theme.html" %}
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Page not found, BullLogic</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;margin:0;text-align:center;padding:20px}
    .code{font-size:44pt;font-weight:700;color:var(--accent);line-height:1}
    h1{font-size:15pt;margin:10px 0 6px}
    p{color:var(--muted);max-width:400px;line-height:1.6;margin:0 auto}
    a.btn{display:inline-block;margin-top:18px;background:var(--accent);color:#fff;text-decoration:none;border-radius:8px;padding:10px 22px;font-size:10.5pt;font-weight:700}
  </style>
</head>
<body>
  <button id="themeToggle" class="theme-toggle theme-toggle-float" onclick="toggleTheme()">☾ Dark</button>
  <div>
    <div class="code">404</div>
    <h1>Page not found</h1>
    <p>The page you are looking for does not exist or has moved. Check the address or head back to the dashboard.</p>
    <a class="btn" href="/">Back to BullLogic</a>
  </div>
</body>
</html>
