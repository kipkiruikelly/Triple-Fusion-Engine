<!DOCTYPE html>
<html lang="en"{{ theme_attr }}>
<head>
  {% include "_theme.html" %}
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Maintenance, BullLogic</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;margin:0;text-align:center}
    .logo{font-size:20pt;font-weight:700;color:var(--white)}.logo span{color:#FF6B35}
    p{color:var(--muted);max-width:420px;line-height:1.6}
  </style>
</head>
<body>
  <button id="themeToggle" class="theme-toggle theme-toggle-float" onclick="toggleTheme()">☾ Dark</button>
  <div>
    <div class="logo">Bull<span>Logic</span></div>
    <h1 style="font-size:14pt;margin:18px 0 8px">We'll be right back</h1>
    <p>BullLogic is undergoing scheduled maintenance. Predictions and your data are safe, please check back in a few minutes.</p>
  </div>
</body>
</html>
